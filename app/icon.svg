<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="6" y1="0" x2="58" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8C00FF"/>
      <stop offset="100%" stop-color="#450693"/>
    </linearGradient>
    <linearGradient id="shine" x1="32" y1="2" x2="32" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="halo" cx="32" cy="32" r="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="32" cy="32" r="7" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="tile">
      <rect width="64" height="64" rx="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#tile)">
    <rect width="64" height="64" fill="url(#bg)"/>
    <rect width="64" height="64" fill="url(#halo)"/>
    <rect width="64" height="64" fill="url(#shine)"/>

    <!-- Outer ripples (fading outward) -->
    <circle cx="32" cy="32" r="27" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2.5"/>
    <circle cx="32" cy="32" r="19" fill="none" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2.5"/>
    <circle cx="32" cy="32" r="11" fill="none" stroke="#ffffff" stroke-opacity="0.9" stroke-width="2.5"/>

    <!-- Core: glow + solid dot -->
    <circle cx="32" cy="32" r="7" fill="url(#coreGlow)"/>
    <circle cx="32" cy="32" r="4" fill="#ffffff"/>
  </g>

  <rect x="0.5" y="0.5" width="63" height="63" rx="15.5" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>
</svg>
